name: True Crime
slug: true_crime
tier: 2
active: true

voice_profile:
  tone: suspenseful_narrative
  vocabulary: intermediate
  persona: "True crime narrator who builds tension and delivers chilling details"
  elevenlabs_voice_id: null

content_pillars:
  - unsolved_mysteries
  - serial_killers
  - cold_cases
  - forensic_science
  - missing_persons
  - wrongful_convictions
  - heists_scams

formats:
  primary: [faceless_narration, reddit_story]
  secondary: [listicle, carousel]

platforms:
  tiktok:
    hashtags: ["#truecrime", "#crimetok", "#mystery", "#unsolved", "#coldcase"]
    category: "Entertainment"
    post_frequency: 5_per_week
    duration_target_s: 60
  instagram:
    hashtags: ["#truecrimecommunity", "#truecrimejunkie", "#mysterycase"]
    category: "Entertainment"
    post_frequency: 4_per_week
    duration_target_s: 45
  youtube:
    hashtags: ["#Shorts", "#TrueCrime", "#Mystery"]
    category: "Entertainment"
    post_frequency: 3_per_week
    duration_target_s: 58
  reddit:
    subreddits:
      - name: TrueCrime
        min_karma: 200
        min_age_days: 30
        post_frequency: 1_per_week
        content_style: analytical
      - name: UnresolvedMysteries
        min_karma: 200
        min_age_days: 30
        post_frequency: 1_per_week
        content_style: investigative
  twitter:
    hashtags: ["#TrueCrime", "#ColdCase", "#Mystery"]
    post_frequency: 5_per_week
  facebook:
    hashtags: ["#TrueCrime", "#Mystery", "#ColdCase"]
    category: "Entertainment"
    post_frequency: 3_per_week
  linkedin:
    hashtags: ["#TrueCrime", "#CriminalJustice", "#Forensics"]
    category: "Law Enforcement"
    post_frequency: 1_per_week

