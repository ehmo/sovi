    category: "Gaming"
    post_frequency: 4_per_week
    duration_target_s: 30
  youtube:
    hashtags: ["#Shorts", "#Gaming", "#GamerTips"]
    category: "Gaming"
    post_frequency: 4_per_week
    duration_target_s: 55
  reddit:
    subreddits:
      - name: gaming
        min_karma: 200
        min_age_days: 30
        post_frequency: 2_per_week
